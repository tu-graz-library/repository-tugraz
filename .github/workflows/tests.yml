name: E2E Tests

on:
  push:
    branches: main
  pull_request:
    branches: main
  # Run weekly on Sundays at 2 AM UTC
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

env:
  # Default environment variables
  DOCKER_IMAGE_NAME: e2e-test-app-${{ github.run_id }}
  COMPOSE_PROJECT_NAME: e2e-test-${{ github.run_id }}
  APPLICATION_URL: https://127.0.0.1:5000

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    # Add more resources for running multiple containers
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }} .
          echo "Docker image built successfully: ${{ env.DOCKER_IMAGE_NAME }}"

      - name: Start services with Docker Compose
        run: |
          # Replace image name in docker-compose file if needed
          export DOCKER_IMAGE_NAME=${{ env.DOCKER_IMAGE_NAME }}

          # Start all services
          docker compose -f docker-compose.full.yml up -d

          echo "Services started, waiting for health checks..."

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.full.yml exec -T postgres pg_isready -h localhost -p 5432; do
              echo "PostgreSQL is unavailable - sleeping"
              sleep 2
            done
          '
          echo "PostgreSQL is ready!"

      - name: Wait for Redis to be ready
        run: |
          echo "Waiting for Redis..."
          timeout 60 bash -c '
            until docker compose -f docker-compose.full.yml exec -T redis redis-cli ping | grep -q PONG; do
              echo "Redis is unavailable - sleeping"
              sleep 2
            done
          '
          echo "Redis is ready!"

      - name: Wait for RabbitMQ to be ready
        run: |
          echo "Waiting for RabbitMQ..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.full.yml exec -T rabbitmq rabbitmq-diagnostics -q ping; do
              echo "RabbitMQ is unavailable - sleeping"
              sleep 2
            done
          '
          echo "RabbitMQ is ready!"

      - name: Wait for OpenSearch to be ready
        run: |
          echo "Waiting for OpenSearch..."
          timeout 120 bash -c '
            until curl -s http://localhost:9200/_cluster/health | grep -q "yellow\|green"; do
              echo "OpenSearch is unavailable - sleeping"
              sleep 5
            done
          '
          echo "OpenSearch is ready!"

